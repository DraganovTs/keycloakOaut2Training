server:
  port: 8081

spring:
  application:
    name: keycloak-demo
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: demo-app
            client-secret: thzWU48ocKLVqjnxjosEhNROuwOlNgax
            scope:
              - openid
              - profile
              - email
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8081/login/oauth2/code/keycloak
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/demo-realm
            user-name-attribute: preferred_username
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-6 mb-1">
        <h1 class="text-2xl text-center font-bold text-gray-900 mb-1">Welcome <span th:text="${name}"></span></h1>
        <table class="w-full table-auto border-collapse text-sm">
            <tr>
                <th class="border-b text-left border-gray-100 p-4 font-medium">Username</th>
                <td class="border-b text-left border-gray-100 p-4 text-gray-500" th:text="${username}"></td>
            </tr>

            <tr>
                <th class="border-b text-left border-gray-100 p-4 font-medium">Email</th>
                <td class="border-b text-left border-gray-100 p-4 text-gray-500" th:text="${email}"></td>
            </tr>

            <tr>
                <th class="border-b text-left border-gray-100 p-4 font-medium">Role</th>
                <td class="border-b text-left border-gray-100 p-4 text-gray-500" th:text="${roles}"></td>
            </tr>
        </table>

        <form th:action="@{/logout}" method="post">
            <button class="w-full bg-red-600 hover:bg-red-700 text-white py-3 px-4 rounded font-medium hover:ng-red-700" type="submit">Logout</button>
        </form>

    </div>
</div>
</body>
</html>

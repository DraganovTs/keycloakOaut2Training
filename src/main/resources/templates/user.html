<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-6 mb-1">
        <h1 class="text-2xl text-center font-bold text-gray-900 mb-1">Welcome <span th:text="${name}"></span></h1>


       <h2 class="font-bold text-gray-900 mb-2 mt-2">What you can do</h2>
        <ul class="list-disc list-inside text-gray-700 text-sm space-y-1">
           <li>Access user dashboard</li>
           <li>View profile information</li>
            <li>Basic application fitures</li>
        </ul>

        <div class="flex gap-3 mt-6">
            <a th:href="@{/home}" class="flex-1 bg-indigo-600 text-white text-center py-2 hover:bg-indigo-700">
                </a>
        </div>

    </div>
</div>
</body>
</html>
